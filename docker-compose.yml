# BI h4c — Hygiene For Care · deploy atrás do Traefik (h4c.codexaurora.com.br)
#
# Só o frontend (nginx) entra na rede do Traefik (proxy); o backend fica na rede
# interna e o nginx faz proxy de /api -> backend:8110. Nenhuma porta exposta no host.
# Certificado via Let's Encrypt (httpChallenge no entrypoint web); router HTTP :80
# valida o cert e redireciona para HTTPS.
#
# IMPORTANTE: a rede externa é referenciada pelo NOME REAL `proxy` (172.18.x, onde
# vive o Traefik). Não usar apelido "traefik" — existe uma rede antiga com esse nome
# noutra sub-rede (172.26.x) e o container acaba na rede errada -> 504 Gateway Timeout.
services:
  # Espelho local do Winthor. O servidor não alcança o Oracle: os dados chegam
  # pelo agente (sync/agente.py), que roda na rede do ERP e envia via /api/sync.
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - interna
    environment:
      POSTGRES_USER: h4c
      POSTGRES_PASSWORD: ${PG_PASSWORD:-h4c_local}
      POSTGRES_DB: h4c
    volumes:
      - pgdata:/var/lib/postgresql/data
      # DDL do espelho — aplicado automaticamente na PRIMEIRA subida
      - ./sync/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h4c -d h4c"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env.producao
    restart: unless-stopped
    networks:
      - interna
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./discovery/analises-spec.json:/discovery/analises-spec.json:ro
      - ./discovery/indicadores-spec.json:/discovery/indicadores-spec.json:ro
    environment:
      - ANALISES_SPEC=/discovery/analises-spec.json
      - INDICADORES_SPEC=/discovery/indicadores-spec.json
      - PG_DSN=postgresql://h4c:${PG_PASSWORD:-h4c_local}@postgres:5432/h4c
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8110/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - interna
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # --- HTTPS router (443) ---
      - "traefik.http.routers.h4c.rule=Host(`h4c.codexaurora.com.br`)"
      - "traefik.http.routers.h4c.entrypoints=websecure"
      - "traefik.http.routers.h4c.tls=true"
      - "traefik.http.routers.h4c.tls.certresolver=le"
      - "traefik.http.services.h4c.loadbalancer.server.port=80"
      # --- HTTP router (80) → redireciona para HTTPS (e valida o certificado) ---
      - "traefik.http.routers.h4c-http.rule=Host(`h4c.codexaurora.com.br`)"
      - "traefik.http.routers.h4c-http.entrypoints=web"
      - "traefik.http.routers.h4c-http.middlewares=h4c-redirect"
      - "traefik.http.middlewares.h4c-redirect.redirectscheme.scheme=https"

networks:
  interna:
    driver: bridge
  proxy:
    external: true

volumes:
  pgdata:
