# BI h4c — Hygiene For Care · deploy atrás do Traefik (h4c.codexaurora.com.br)
#
# Padrão idêntico aos demais projetos de /srv/stack (ex.: aureon): só o frontend
# (nginx) entra na rede do Traefik; o backend fica na rede interna e o nginx faz
# proxy de /api -> backend:8110. Nenhuma porta é exposta no host — pega carona no
# 80/443 do Traefik. Certificado via Let's Encrypt (httpChallenge no entrypoint web),
# por isso há um router HTTP :80 que valida o certificado e redireciona para HTTPS.
services:
  backend:
    build: ./backend
    container_name: h4c-backend
    env_file: ./backend/.env.producao
    restart: unless-stopped
    networks:
      - interna
    volumes:
      - ./discovery/analises-spec.json:/discovery/analises-spec.json:ro
      - ./discovery/indicadores-spec.json:/discovery/indicadores-spec.json:ro
    environment:
      - ANALISES_SPEC=/discovery/analises-spec.json
      - INDICADORES_SPEC=/discovery/indicadores-spec.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8110/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: h4c-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - interna
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      # --- HTTPS router (443) ---
      - "traefik.http.routers.h4c.rule=Host(`${DOMAIN:-h4c.codexaurora.com.br}`)"
      - "traefik.http.routers.h4c.entrypoints=${ENTRYPOINT:-websecure}"
      - "traefik.http.routers.h4c.tls=true"
      - "traefik.http.routers.h4c.tls.certresolver=${CERT_RESOLVER:-le}"
      - "traefik.http.services.h4c.loadbalancer.server.port=80"
      # --- HTTP router (80) → redireciona para HTTPS (e valida o certificado) ---
      - "traefik.http.routers.h4c-http.rule=Host(`${DOMAIN:-h4c.codexaurora.com.br}`)"
      - "traefik.http.routers.h4c-http.entrypoints=${ENTRYPOINT_HTTP:-web}"
      - "traefik.http.routers.h4c-http.middlewares=h4c-redirect"
      - "traefik.http.middlewares.h4c-redirect.redirectscheme.scheme=https"

networks:
  interna:
    driver: bridge
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
