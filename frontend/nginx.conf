server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do React caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> backend (nome do serviço no docker-compose)
    location /api/ {
        proxy_pass http://backend:8110;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # lotes do sincronismo: tabelas largas (PCPRODUT tem 792 colunas) passam
        # muito do limite padrão de 1 MB do nginx -> "broken pipe" no agente
        client_max_body_size 64m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
